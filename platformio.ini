; ===========================================================================
; PlatformIO — Grúa modelo (ESP8266)
; ===========================================================================
; Board: ajustar según tu módulo específico.
;   - "nodemcuv2"   -> NodeMCU v2/v3 (ESP-12E)
;   - "d1_mini"     -> Wemos D1 Mini
;   - "esp12e"      -> genérico ESP-12E
; Si no estás seguro, nodemcuv2 funciona para la mayoría de las placas
; de desarrollo ESP8266 con USB integrado.
; ===========================================================================

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_src_filter = +<*> -<servo_test.cpp>

; PubSubClient para MQTT (WiFiClientSecure ya viene en el core de ESP8266)
lib_deps =
    knolleary/PubSubClient @ ^2.8

monitor_speed = 115200
upload_speed = 921600

